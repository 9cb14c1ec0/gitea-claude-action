# Example Gitea workflow. Place at .gitea/workflows/claude.yml in your repo.
name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned, labeled]
  pull_request:
    types: [opened]

jobs:
  claude:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude
        uses: your-org/gitea-claude-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          gitea_token: ${{ secrets.GITEA_TOKEN }}
          # Optional:
          # trigger_phrase: "@claude"
          # label_trigger: "claude"
          # model: "claude-opus-4-8"
          # custom_instructions: "Follow the repo's CONTRIBUTING.md."
